name: OpenHands Resolver

on:
  issues:
    types:
      - labeled
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to send to OpenHands
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether this event should run OpenHands
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let shouldRun = false;

            if (eventName === 'workflow_dispatch') {
              shouldRun = true;
            } else if (eventName === 'issues') {
              shouldRun = context.payload.label?.name === 'openhands';
            } else if (eventName === 'issue_comment') {
              const body = context.payload.comment?.body || '';
              shouldRun = body.startsWith('@openhands');
            }

            core.setOutput('should_run', shouldRun ? 'true' : 'false');

      - name: Check out repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build OpenHands prompt from issue context
        if: steps.gate.outputs.should_run == 'true'
        id: prompt
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('issue_number'))
              : context.payload.issue.number;
            const defaultBranch = context.payload.repository?.default_branch || process.env.GITHUB_REF_NAME || 'main';

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const commentSection = comments.length === 0
              ? '_No issue comments yet._'
              : comments.map((comment) => {
                  const body = (comment.body || '').trim() || '_Empty comment._';
                  return [
                    `### Comment by @${comment.user.login}`,
                    '',
                    body,
                  ].join('\n');
                }).join('\n\n---\n\n');

            const triggerDetails = context.eventName === 'issue_comment'
              ? [
                  '## Trigger comment',
                  '',
                  `Triggered by @${context.payload.comment.user.login}:`,
                  '',
                  context.payload.comment.body || '_Empty trigger comment._',
                ].join('\n')
              : '## Trigger comment\n\n_No trigger comment for this run._';

            const prompt = [
              '# But Dad OpenHands issue resolver',
              '',
              'You are working in the But Dad repository.',
              'Follow the product and architecture brief in `AGENTS.md`.',
              'Keep changes focused and incremental.',
              'Prefer shipping the smallest useful step toward the multi-agent spec loop.',
              'If the issue is planning-oriented, update docs instead of jumping to broad implementation.',
              'If implementation is needed, add or update tests when practical and keep the change set small.',
              'Open a pull request back to the repository default branch when the task is complete.',
              '',
              '## Repository',
              '',
              `${owner}/${repo}`,
              '',
              '## Issue',
              '',
              `- Number: #${issue.number}`,
              `- Title: ${issue.title}`,
              `- URL: ${issue.html_url}`,
              `- Author: @${issue.user.login}`,
              `- Labels: ${(issue.labels || []).map((label) => label.name).join(', ') || 'none'}`,
              '',
              '## Issue body',
              '',
              (issue.body || '_No issue body provided._').trim(),
              '',
              triggerDetails,
              '',
              '## Issue comments',
              '',
              commentSection,
              '',
              '## Execution instructions',
              '',
              '1. Review `AGENTS.md` and any files directly related to the issue.',
              '2. Make the smallest useful change that resolves the issue.',
              '3. Update documentation when behavior or architecture changes.',
              '4. Run the most relevant validation you can inside the repository and report the results.',
              '5. Open or update a pull request and summarize what changed.',
            ].join('\n');

            const promptPath = '.github/prompts/openhands-issue.md';
            fs.mkdirSync('.github/prompts', { recursive: true });
            fs.writeFileSync(promptPath, `${prompt}\n`);
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('prompt_path', promptPath);
            core.setOutput('default_branch', defaultBranch);

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenHands workflow deps
        if: steps.gate.outputs.should_run == 'true'
        run: python -m pip install --upgrade pip requests

      - name: Start OpenHands
        if: steps.gate.outputs.should_run == 'true'
        id: openhands
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          INPUT_PROMPT: ${{ steps.prompt.outputs.prompt_path }}
          INPUT_REPOSITORY: ${{ github.repository }}
          INPUT_SELECTED_BRANCH: ${{ steps.prompt.outputs.default_branch }}
          INPUT_BASE_URL: ${{ vars.OPENHANDS_BASE_URL }}
          INPUT_POLL: 'true'
          INPUT_TIMEOUT: '1800'
          INPUT_INTERVAL: '30'
        run: python .github/scripts/openhands_run.py

      - name: Comment on issue with OpenHands run link
        if: steps.gate.outputs.should_run == 'true' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          CONVERSATION_URL: ${{ steps.openhands.outputs.conversation-url }}
          CONVERSATION_STATUS: ${{ steps.openhands.outputs.status }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                '🤖 OpenHands has been triggered for this issue.',
                '',
                `- Status: ${process.env.CONVERSATION_STATUS || 'started'}`,
                `- Conversation: ${process.env.CONVERSATION_URL || 'not available'}`,
                '',
                'If you want to steer the run, leave another comment starting with `@openhands`.',
              ].join('\n'),
            });
